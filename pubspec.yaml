name: itec_parking
description: ITEC National Parking Management System - Official Driver Portal
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.2.1

  # State Management
  provider: ^6.1.2

  # Local Storage
  shared_preferences: ^2.2.3

  # UI & Animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1

  # Notifications
  flutter_local_notifications: ^17.2.2

  # DateTime & Formatting
  intl: ^0.19.0

  # Utils
  uuid: ^4.4.0
  flutter_slidable: ^3.1.1
  country_code_picker: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
