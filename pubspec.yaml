name: itec_parking
description: ITEC National Parking Management System - Official Driver Portal
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.2.1

  # State Management
  provider: ^6.1.2

  # Local Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # UI & Animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # Notifications
  flutter_local_notifications: ^17.2.2

  # DateTime & Formatting
  intl: ^0.19.0

  # Sharing
  share_plus: ^10.1.4

  # Utils
  country_code_picker: ^3.4.1
  url_launcher: ^6.3.0
  local_auth: ^2.3.0
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  path: ^1.9.0

  # Social Auth
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^6.1.0
  sign_in_with_apple: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1


flutter:
  uses-material-design: true

  assets:
    - assets/images/app_photos/
